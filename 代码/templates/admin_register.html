{% extends "base.html" %}
{% block title %}注册管理员 · 二手集市{% endblock %}
{% block content %}
<div class="auth-box">
  <h2>创建管理员</h2>
  <form method="post">
    {{ csrf_field() }}
    <label>账号<input type="text" name="username" required></label>
    <label>密码<input type="password" name="password" required></label>
    <label>昵称<input type="text" name="nickname" required></label>
    <label>手机号<input type="text" name="phone" required></label>
    <label>手机验证码</label>
    <div class="verify-row">
      <input type="text" name="phone_code" placeholder="测试环境任意填写" required>
      <button type="button" class="btn-outline send-code-btn" data-code-button data-requires="phone" data-require-message="请先填写手机号">发送验证码</button>
    </div>
    <button type="submit" class="btn-primary">创建管理员</button>
  </form>
  <p class="auth-switch"><a href="{{ url_for('admin_users') }}">返回用户管理</a></p>
</div>
{% endblock %}
