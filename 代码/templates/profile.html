{% extends "base.html" %}
{% block title %}账号设置 · 二手集市{% endblock %}
{% block content %}
<div class="profile-layout">
  <aside class="profile-panel">
    <div class="profile-avatar">{{ user.nickname[:1] }}</div>
    <h2>{{ user.nickname }}</h2>
    <p>账号：{{ user.username }}</p>
    <p>手机号：{{ user.phone or '未填写' }}</p>
  </aside>

  <form class="profile-form" method="post">
    {{ csrf_field() }}
    <section>
      <h2>账号设置</h2>
      <p class="auth-tip">管理你的个人资料和登录密码。</p>
      <label>账号<input type="text" value="{{ user.username }}" disabled></label>
      <label>昵称<input type="text" name="nickname" maxlength="50" value="{{ user.nickname }}" required></label>
      <label>手机号<input type="text" name="phone" maxlength="20" value="{{ user.phone or '' }}"></label>
    </section>

    <section>
      <h2>修改密码</h2>
      <p class="auth-tip">不修改密码时，下面三项留空即可。</p>
      <label>旧密码<input type="password" name="old_password" autocomplete="current-password"></label>
      <div class="form-row">
        <label>新密码<input type="password" name="new_password" minlength="6" autocomplete="new-password"></label>
        <label>确认新密码<input type="password" name="confirm_password" minlength="6" autocomplete="new-password"></label>
      </div>
    </section>

    <div class="form-actions">
      <button type="submit" class="btn-primary">保存设置</button>
      <a class="btn-outline" href="{{ url_for('me') }}">返回个人中心</a>
    </div>
  </form>
</div>
{% endblock %}
