{% extends "base.html" %}
{% block title %}系统设置 · 二手集市{% endblock %}
{% block content %}
<div class="admin-head">
  <h2 class="page-title">系统设置</h2>
</div>

<form method="post" class="form-box">
  {{ csrf_field() }}
  <label class="check-row">
    <input type="checkbox" name="admin_registration_enabled" value="1" {% if admin_registration_enabled %}checked{% endif %}>
    <span>允许已有管理员创建新管理员</span>
  </label>
  {% if admin_registration_enabled %}
    <a class="btn-outline" href="{{ url_for('admin_register') }}">创建管理员</a>
  {% endif %}
  <button type="submit" class="btn-primary">保存设置</button>
</form>
{% endblock %}
