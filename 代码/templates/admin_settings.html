{% extends "base.html" %}
{% block title %}系统设置 · 二手集市{% endblock %}
{% block content %}
<div class="admin-head">
  <h2 class="page-title">系统设置</h2>
  <div class="admin-tabs">
    <a class="btn-outline btn-xs" href="{{ url_for('admin_dashboard') }}">后台首页</a>
    {% if current_user.admin.can_manage_products %}<a class="btn-outline btn-xs" href="{{ url_for('admin_products') }}">商品管理</a>{% endif %}
    <a class="btn-outline btn-xs" href="{{ url_for('admin_orders') }}">订单管理</a>
    {% if current_user.admin.can_manage_users %}<a class="btn-outline btn-xs" href="{{ url_for('admin_users') }}">用户管理</a>{% endif %}
  </div>
</div>

<form method="post" class="form-box">
  {{ csrf_field() }}
  <label class="check-row">
    <input type="checkbox" name="admin_registration_enabled" value="1" {% if admin_registration_enabled %}checked{% endif %}>
    <span>开放管理员注册入口</span>
  </label>
  <button type="submit" class="btn-primary">保存设置</button>
</form>
{% endblock %}
