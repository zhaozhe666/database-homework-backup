{% extends "base.html" %}
{% block title %}登录 · 二手集市{% endblock %}
{% block content %}
<div class="auth-box">
  <h2>登录</h2>
  <form method="post">
    {{ csrf_field() }}
    <label>账号<input type="text" name="username" value="{{ username or '' }}" required></label>
    <label>密码<input type="password" name="password" required></label>
    <button type="submit" class="btn-primary">登录</button>
  </form>
  <p class="auth-switch">还没有账号？<a href="{{ url_for('register') }}">立即注册</a></p>
  <p class="auth-tip">演示账号：alice / bob / carol，密码均为 123456</p>
</div>
{% endblock %}
