{% extends "base.html" %}
{% block title %}发布闲置 · 二手集市{% endblock %}
{% block content %}
<div class="form-box">
  <h2>发布闲置</h2>
  <form method="post" enctype="multipart/form-data">
    {{ csrf_field() }}
    <label>标题<input type="text" name="title" maxlength="100" required></label>
    <label>分类
      <select name="category_id">
        {% for c in categories %}
          <option value="{{ c.id }}">{{ c.name }}</option>
        {% endfor %}
      </select>
    </label>
    <div class="form-row">
      <label>价格(元)<input type="number" name="price" step="1" min="1" required></label>
      <label>成色
        <select name="condition_level">
          <option>全新</option><option>99新</option><option selected>95新</option>
          <option>9成新</option><option>8成新</option><option>7成新及以下</option>
        </select>
      </label>
    </div>
    <div class="image-field">
      <label class="upload-card" for="image_files">
        <input id="image_files" type="file" name="image_files" accept="image/*" multiple>
        <span class="upload-preview-grid" aria-hidden="true"></span>
        <span class="upload-mark">+</span>
        <span class="upload-text">添加商品图片，最多 4 张</span>
      </label>
      <div class="upload-file-name" aria-live="polite">未选择图片</div>
    </div>
    <label>商品描述<textarea name="description" rows="5" placeholder="描述一下宝贝的细节、入手渠道、瑕疵等"></textarea></label>
    <button type="submit" class="btn-primary">立即发布</button>
  </form>
</div>
<script>
  const imageInput = document.getElementById("image_files");
  const uploadCard = document.querySelector(".upload-card");
  const uploadPreviewGrid = document.querySelector(".upload-preview-grid");
  const uploadFileName = document.querySelector(".upload-file-name");
  const selectedImages = new DataTransfer();
  let previewUrls = [];

  function clearPreviewUrls() {
    previewUrls.forEach((url) => URL.revokeObjectURL(url));
    previewUrls = [];
  }

  function syncInputFiles() {
    imageInput.files = selectedImages.files;
  }

  function renderPreviews() {
    const files = Array.from(selectedImages.files);
    clearPreviewUrls();
    uploadPreviewGrid.innerHTML = "";

    if (!files.length) {
      uploadCard.classList.remove("has-file");
      uploadFileName.textContent = "未选择图片";
      return;
    }

    files.forEach((file, index) => {
      const url = URL.createObjectURL(file);
      previewUrls.push(url);
      const item = document.createElement("span");
      item.className = "upload-preview-item";
      const img = document.createElement("img");
      img.src = url;
      img.alt = "";
      const removeButton = document.createElement("button");
      removeButton.type = "button";
      removeButton.className = "upload-remove";
      removeButton.textContent = "×";
      removeButton.addEventListener("click", (event) => {
        event.preventDefault();
        event.stopPropagation();
        const remaining = Array.from(selectedImages.files).filter((_, i) => i !== index);
        selectedImages.items.clear();
        remaining.forEach((itemFile) => selectedImages.items.add(itemFile));
        syncInputFiles();
        renderPreviews();
      });
      item.appendChild(img);
      item.appendChild(removeButton);
      uploadPreviewGrid.appendChild(item);
    });

    uploadCard.classList.add("has-file");
    uploadFileName.textContent = "已选择 " + files.length + " 张，可继续添加";
  }

  imageInput.addEventListener("change", () => {
    const incoming = Array.from(imageInput.files || []);
    const remainingSlots = 4 - selectedImages.files.length;

    incoming.slice(0, remainingSlots).forEach((file) => selectedImages.items.add(file));
    syncInputFiles();
    renderPreviews();

    if (incoming.length > remainingSlots) {
      uploadFileName.textContent = "最多 4 张，已保留前 4 张";
    }
  });
</script>
{% endblock %}
